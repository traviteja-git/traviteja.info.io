<svg width="900" height="460" viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="460" fill="#f8faff" rx="12"/>
  <rect width="900" height="460" fill="none" stroke="#e4e4e7" stroke-width="1.5" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#111111">7 skills that actually matter — grouped by where they apply</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#6b7280">Not tricks. Habits. The gap is between knowing them and doing them consistently.</text>

  <!-- Column 1: SETUP (skills 1–3) -->
  <!-- Column header -->
  <rect x="28" y="74" width="256" height="36" fill="#1d4ed8" rx="8"/>
  <text x="156" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">SETUP</text>

  <!-- Skill 1 -->
  <rect x="28" y="118" width="256" height="86" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" rx="8"/>
  <text x="50" y="140" font-size="12" font-weight="700" fill="#1d4ed8">01  Stay updated — selectively</text>
  <text x="50" y="158" font-size="11" fill="#6b7280">Unfollow noise. Pick 2–3 people</text>
  <text x="50" y="173" font-size="11" fill="#6b7280">who teach with examples. One</text>
  <text x="50" y="188" font-size="11" fill="#6b7280">newsletter. One action per article.</text>

  <!-- Skill 2 -->
  <rect x="28" y="212" width="256" height="86" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" rx="8"/>
  <text x="50" y="234" font-size="12" font-weight="700" fill="#1d4ed8">02  Pick one tool, go deep</text>
  <text x="50" y="252" font-size="11" fill="#6b7280">Delete the others. 30 days, one</text>
  <text x="50" y="267" font-size="11" fill="#6b7280">tool. Learn projects, memory,</text>
  <text x="50" y="282" font-size="11" fill="#6b7280">API access — not just the chat UI.</text>

  <!-- Skill 3 -->
  <rect x="28" y="306" width="256" height="86" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" rx="8"/>
  <text x="50" y="328" font-size="12" font-weight="700" fill="#1d4ed8">03  Brief it before you prompt</text>
  <text x="50" y="346" font-size="11" fill="#6b7280">Build "AI Files" — tone, stack,</text>
  <text x="50" y="361" font-size="11" fill="#6b7280">audience, constraints. Upload</text>
  <text x="50" y="376" font-size="11" fill="#6b7280">before serious sessions.</text>

  <!-- Column 2: INTERACTION (skills 4–5) -->
  <rect x="322" y="74" width="256" height="36" fill="#0d9488" rx="8"/>
  <text x="450" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">INTERACTION</text>

  <!-- Skill 4 -->
  <rect x="322" y="118" width="256" height="86" fill="#ffffff" stroke="#99f6e4" stroke-width="1.5" rx="8"/>
  <text x="344" y="140" font-size="12" font-weight="700" fill="#0d9488">04  Teach it what you know</text>
  <text x="344" y="158" font-size="11" fill="#6b7280">Prompt it to interview you. Your</text>
  <text x="344" y="173" font-size="11" fill="#6b7280">patterns, scars, non-obvious rules.</text>
  <text x="344" y="188" font-size="11" fill="#6b7280">Export to a doc. Use every session.</text>

  <!-- Skill 5 -->
  <rect x="322" y="212" width="256" height="86" fill="#ffffff" stroke="#99f6e4" stroke-width="1.5" rx="8"/>
  <text x="344" y="234" font-size="12" font-weight="700" fill="#0d9488">05  Have a conversation, not a query</text>
  <text x="344" y="252" font-size="11" fill="#6b7280">"Don't start yet. Ask me questions</text>
  <text x="344" y="267" font-size="11" fill="#6b7280">first." Critique specifically. Push</text>
  <text x="344" y="282" font-size="11" fill="#6b7280">back. You write the final 5%.</text>

  <!-- Skill 5b note -->
  <rect x="322" y="306" width="256" height="86" fill="#f0fdfa" stroke="#ccfbf1" stroke-width="1.5" rx="8" stroke-dasharray="5,3"/>
  <text x="450" y="334" text-anchor="middle" font-size="11" fill="#0d9488">The conversation is the skill.</text>
  <text x="450" y="352" text-anchor="middle" font-size="11" fill="#0d9488">Not the prompt.</text>
  <text x="450" y="375" text-anchor="middle" font-size="10.5" fill="#6b7280">Most people search. Better</text>
  <text x="450" y="390" text-anchor="middle" font-size="10.5" fill="#6b7280">developers iterate.</text>

  <!-- Column 3: DISCIPLINE (skills 6–7) -->
  <rect x="616" y="74" width="256" height="36" fill="#7c3aed" rx="8"/>
  <text x="744" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">DISCIPLINE</text>

  <!-- Skill 6 -->
  <rect x="616" y="118" width="256" height="86" fill="#ffffff" stroke="#ddd6fe" stroke-width="1.5" rx="8"/>
  <text x="638" y="140" font-size="12" font-weight="700" fill="#7c3aed">06  Ship before it's perfect</text>
  <text x="638" y="158" font-size="11" fill="#6b7280">First draft costs 20 minutes now.</text>
  <text x="638" y="173" font-size="11" fill="#6b7280">Stop scheduling meetings to</text>
  <text x="638" y="188" font-size="11" fill="#6b7280">discuss ideas. Build, then align.</text>

  <!-- Skill 7 -->
  <rect x="616" y="212" width="256" height="86" fill="#ffffff" stroke="#ddd6fe" stroke-width="1.5" rx="8"/>
  <text x="638" y="234" font-size="12" font-weight="700" fill="#7c3aed">07  Lead AI — don't follow it</text>
  <text x="638" y="252" font-size="11" fill="#6b7280">Split the work explicitly. AI owns</text>
  <text x="638" y="267" font-size="11" fill="#6b7280">the 80%. You own judgment,</text>
  <text x="638" y="282" font-size="11" fill="#6b7280">strategy, and catching mistakes.</text>

  <!-- Key rule -->
  <rect x="616" y="306" width="256" height="86" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5" rx="8" stroke-dasharray="5,3"/>
  <text x="744" y="334" text-anchor="middle" font-size="11" fill="#7c3aed">Only use AI where</text>
  <text x="744" y="352" text-anchor="middle" font-size="11" fill="#7c3aed">you're the expert.</text>
  <text x="744" y="375" text-anchor="middle" font-size="10.5" fill="#6b7280">If you can't spot the mistake,</text>
  <text x="744" y="390" text-anchor="middle" font-size="10.5" fill="#6b7280">don't delegate it.</text>

  <!-- Bottom note -->
  <text x="450" y="435" text-anchor="middle" font-size="11" fill="#9ca3af">Pick one. Run it for two weeks. Add the next. That's the only trade that matters.</text>
</svg>
