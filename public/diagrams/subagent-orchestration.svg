<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" width="1000" height="340">
  <defs>
    <style>text { font-family: system-ui, -apple-system, sans-serif; }</style>
    <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="340" rx="12" fill="#f8faff" stroke="#e4e4e7" stroke-width="1.5"/>

  <!-- ① All box rects (backgrounds first, then header fills) -->

  <!-- Orchestrator: x=180, right=335, center-x=257 -->
  <rect x="180" y="95" width="155" height="150" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1.5"/>
  <rect x="180" y="95" width="155" height="34" rx="8" fill="#1e40af"/>
  <rect x="180" y="115" width="155" height="14" fill="#1e40af"/>

  <!-- Subagent 1: x=420, right=595, center-x=507 -->
  <rect x="420" y="20" width="175" height="90" rx="8" fill="#ffffff" stroke="#dbeafe" stroke-width="1.5"/>
  <rect x="420" y="20" width="175" height="30" rx="8" fill="#2563eb"/>
  <rect x="420" y="38" width="175" height="12" fill="#2563eb"/>

  <!-- Subagent 2: x=420, right=595, center-x=507 -->
  <rect x="420" y="125" width="175" height="90" rx="8" fill="#ffffff" stroke="#dbeafe" stroke-width="1.5"/>
  <rect x="420" y="125" width="175" height="30" rx="8" fill="#2563eb"/>
  <rect x="420" y="143" width="175" height="12" fill="#2563eb"/>

  <!-- Subagent 3: x=420, right=595, center-x=507 -->
  <rect x="420" y="230" width="175" height="90" rx="8" fill="#ffffff" stroke="#ede9fe" stroke-width="1.5"/>
  <rect x="420" y="230" width="175" height="30" rx="8" fill="#7c3aed"/>
  <rect x="420" y="248" width="175" height="12" fill="#7c3aed"/>

  <!-- Results: x=710, right=880, center-x=795 -->
  <rect x="710" y="95" width="170" height="150" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1.5"/>
  <rect x="710" y="95" width="170" height="34" rx="8" fill="#16a34a"/>
  <rect x="710" y="115" width="170" height="14" fill="#16a34a"/>

  <!-- ② Arrows (after boxes, before text) -->

  <!-- Orchestrator right edge (x=335) → Subagent left edges (x=420, tip at 418+1.5=419.5) -->
  <!-- Fan from orchestrator center y=170: up to SA1 (y=65), straight to SA2 (y=170), down to SA3 (y=275) -->
  <line x1="335" y1="145" x2="418" y2="65"  stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="335" y1="170" x2="418" y2="170" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="335" y1="195" x2="418" y2="275" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Subagent right edges (x=595) → Results left edge (x=710, tip at 708+1.5=709.5) -->
  <!-- SA1 (y=65) and SA3 (y=275) angle toward Results center region; SA2 straight across -->
  <line x1="595" y1="65"  x2="708" y2="145" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <line x1="595" y1="170" x2="708" y2="170" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <line x1="595" y1="275" x2="708" y2="195" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-purple)"/>

  <!-- ③ Text labels (always last) -->

  <!-- Orchestrator -->
  <text x="257" y="117" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600" letter-spacing="0.08em">ORCHESTRATOR</text>
  <text x="257" y="155" text-anchor="middle" fill="#1e3a8a" font-size="12" font-weight="600">Main Session</text>
  <text x="257" y="175" text-anchor="middle" fill="#94a3b8" font-size="11">Full context</text>
  <text x="257" y="192" text-anchor="middle" fill="#94a3b8" font-size="11">delegates tasks</text>
  <text x="257" y="209" text-anchor="middle" fill="#94a3b8" font-size="11">receives summaries</text>

  <!-- Subagent 1 -->
  <text x="507" y="40"  text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600" letter-spacing="0.08em">SUBAGENT</text>
  <text x="507" y="67"  text-anchor="middle" fill="#1e40af" font-size="12" font-weight="600">Code Reviewer</text>
  <text x="507" y="84"  text-anchor="middle" fill="#94a3b8" font-size="11">Read-only · returns issues list</text>

  <!-- Subagent 2 -->
  <text x="507" y="145" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600" letter-spacing="0.08em">SUBAGENT</text>
  <text x="507" y="172" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="600">Test Analyst</text>
  <text x="507" y="189" text-anchor="middle" fill="#94a3b8" font-size="11">Bash + Read · returns root causes</text>

  <!-- Subagent 3 -->
  <text x="507" y="250" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600" letter-spacing="0.08em">SUBAGENT</text>
  <text x="507" y="277" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="600">Doc Generator</text>
  <text x="507" y="294" text-anchor="middle" fill="#94a3b8" font-size="11">Read + Write · returns JSON docs</text>

  <!-- Results -->
  <text x="795" y="117" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600" letter-spacing="0.08em">RESULTS</text>
  <text x="795" y="155" text-anchor="middle" fill="#15803d" font-size="12" font-weight="600">Clean Summaries</text>
  <text x="795" y="175" text-anchor="middle" fill="#94a3b8" font-size="11">Only outputs</text>
  <text x="795" y="192" text-anchor="middle" fill="#94a3b8" font-size="11">returned to main</text>
  <text x="795" y="209" text-anchor="middle" fill="#94a3b8" font-size="11">context</text>

  <!-- Caption -->
  <text x="500" y="328" text-anchor="middle" fill="#94a3b8" font-size="12">Each subagent runs in its own isolated context — only the final output returns to the main session</text>
</svg>
