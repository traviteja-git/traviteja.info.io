<svg viewBox="0 0 1000 290" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,-apple-system,sans-serif;">
  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="290" rx="12" fill="#f8faff" stroke="#e4e4e7" stroke-width="1.5"/>

  <!-- Title -->
  <text x="500" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Multi-Turn Conversations — You Send Everything, Every Time</text>
  <text x="500" y="46" text-anchor="middle" font-size="11" fill="#6b7280">Claude has no server-side session. The "memory" is your conversation_history array, sent in full on each request.</text>

  <!-- ── PANEL RECTS ── -->
  <!-- Turn 1 panel -->
  <rect x="30" y="64" width="270" height="190" rx="8" fill="#fff" stroke="#e4e4e7" stroke-width="1.5"/>
  <!-- Turn 2 panel -->
  <rect x="370" y="64" width="270" height="190" rx="8" fill="#fff" stroke="#e4e4e7" stroke-width="1.5"/>
  <!-- Turn 3 panel -->
  <rect x="710" y="64" width="260" height="190" rx="8" fill="#fff" stroke="#e4e4e7" stroke-width="1.5"/>

  <!-- Panel header rects -->
  <rect x="30" y="64" width="270" height="32" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <rect x="370" y="64" width="270" height="32" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <rect x="710" y="64" width="260" height="32" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>

  <!-- Turn 1 message blocks -->
  <rect x="44" y="108" width="240" height="28" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>

  <!-- Turn 2 message blocks -->
  <rect x="384" y="108" width="240" height="28" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <rect x="384" y="144" width="240" height="28" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <rect x="384" y="180" width="240" height="28" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>

  <!-- Turn 3 message blocks -->
  <rect x="724" y="108" width="232" height="28" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <rect x="724" y="144" width="232" height="28" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <rect x="724" y="180" width="232" height="28" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <rect x="724" y="216" width="232" height="28" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>

  <!-- ── ARROWS BETWEEN PANELS ── -->
  <line x1="304" y1="159" x2="366" y2="159" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <line x1="644" y1="159" x2="706" y2="159" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- ── TEXT LABELS ── -->

  <!-- Panel headers -->
  <text x="165" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">Turn 1 — API Request</text>
  <text x="505" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">Turn 2 — API Request</text>
  <text x="840" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">Turn 3 — API Request</text>

  <!-- Turn 1 content -->
  <text x="164" y="128" text-anchor="middle" font-size="11" fill="#1d4ed8">user: "My Airflow DAG keeps failing"</text>
  <text x="164" y="152" font-size="10" fill="#6b7280" text-anchor="middle">↳ 1 message sent</text>

  <!-- Turn 2 content -->
  <text x="504" y="128" text-anchor="middle" font-size="11" fill="#1d4ed8">user: "My Airflow DAG keeps failing"</text>
  <text x="504" y="164" text-anchor="middle" font-size="11" fill="#15803d">assistant: "Check the XCom..."</text>
  <text x="504" y="200" text-anchor="middle" font-size="11" fill="#1d4ed8">user: "What if I'm on K8s?"</text>
  <text x="504" y="224" font-size="10" fill="#6b7280" text-anchor="middle">↳ 3 messages sent</text>

  <!-- Turn 3 content -->
  <text x="840" y="128" text-anchor="middle" font-size="11" fill="#1d4ed8">user: "My Airflow DAG keeps..."</text>
  <text x="840" y="164" text-anchor="middle" font-size="11" fill="#15803d">assistant: "Check the XCom..."</text>
  <text x="840" y="200" text-anchor="middle" font-size="11" fill="#1d4ed8">user: "What if I'm on K8s?"</text>
  <text x="840" y="236" text-anchor="middle" font-size="11" fill="#15803d">assistant: "On K8s, use..."</text>
  <text x="840" y="260" font-size="10" fill="#6b7280" text-anchor="middle">↳ 4 messages sent — costs grow</text>

  <!-- Arrow labels -->
  <text x="335" y="153" text-anchor="middle" font-size="9" fill="#6b7280">next</text>
  <text x="335" y="164" text-anchor="middle" font-size="9" fill="#6b7280">turn</text>
  <text x="675" y="153" text-anchor="middle" font-size="9" fill="#6b7280">next</text>
  <text x="675" y="164" text-anchor="middle" font-size="9" fill="#6b7280">turn</text>

  <!-- Bottom note -->
  <text x="500" y="278" text-anchor="middle" font-size="10" fill="#9ca3af">A 10-turn conversation sends 10× the input tokens of a 1-turn call — input costs accumulate linearly</text>

</svg>
