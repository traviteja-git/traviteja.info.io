<svg viewBox="0 0 1000 210" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,-apple-system,sans-serif;">

  <!-- Background -->
  <rect width="1000" height="210" rx="12" fill="#f8faff" stroke="#e4e4e7" stroke-width="1.5"/>

  <!-- Title -->
  <text x="500" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">BPE Tokenization — 8 words become 11 tokens</text>
  <text x="500" y="46" text-anchor="middle" font-size="11" fill="#6b7280">Compound words split: "Airflow" → 2 tokens · "DAGs" → 2 tokens · integers enter the transformer, never raw text</text>

  <!-- ── CHIP RECTS (all rects before text) ── -->

  <!-- 1: How — blue -->
  <rect x="119" y="62" width="48" height="34" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- 2: does — green -->
  <rect x="177" y="62" width="60" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <!-- 3: Apache — blue -->
  <rect x="247" y="62" width="76" height="34" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- 4: Air — orange SPLIT -->
  <rect x="333" y="62" width="56" height="34" rx="5" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <!-- 5: flow — orange SPLIT -->
  <rect x="399" y="62" width="56" height="34" rx="5" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <!-- 6: schedule — green -->
  <rect x="465" y="62" width="90" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <!-- 7: D — red SPLIT -->
  <rect x="565" y="62" width="40" height="34" rx="5" fill="#fef2f2" stroke="#f87171" stroke-width="2"/>
  <!-- 8: AGs — red SPLIT -->
  <rect x="615" y="62" width="48" height="34" rx="5" fill="#fef2f2" stroke="#f87171" stroke-width="2"/>
  <!-- 9: in — blue -->
  <rect x="673" y="62" width="48" height="34" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- 10: production — green -->
  <rect x="731" y="62" width="104" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <!-- 11: ? — gray -->
  <rect x="845" y="62" width="36" height="34" rx="5" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>

  <!-- ── BRACKET LINES ── -->
  <!-- "Airflow" bracket: x=333 to x=455 -->
  <path d="M333,97 L333,106 L454,106 L454,97" stroke="#fb923c" stroke-width="1.5" fill="none"/>
  <!-- "DAGs" bracket: x=565 to x=663 -->
  <path d="M565,97 L565,106 L662,106 L662,97" stroke="#f87171" stroke-width="1.5" fill="none"/>

  <!-- ── CHIP LABELS (all text last) ── -->
  <text x="143" y="84" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#1d4ed8">How</text>
  <text x="207" y="84" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#15803d"> does</text>
  <text x="285" y="84" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#1d4ed8"> Apache</text>
  <text x="361" y="84" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#c2410c"> Air</text>
  <text x="427" y="84" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#c2410c">flow</text>
  <text x="510" y="84" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#15803d"> schedule</text>
  <text x="585" y="84" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#dc2626"> D</text>
  <text x="639" y="84" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#dc2626">AGs</text>
  <text x="697" y="84" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#1d4ed8"> in</text>
  <text x="783" y="84" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#15803d"> production</text>
  <text x="863" y="84" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#374151">?</text>

  <!-- ── BRACKET LABELS ── -->
  <text x="393" y="120" text-anchor="middle" font-size="10" fill="#c2410c">"Airflow" → 2 tokens</text>
  <text x="613" y="120" text-anchor="middle" font-size="10" fill="#dc2626">"DAGs" → 2 tokens</text>

  <!-- ── INTEGER ID ROW ── -->
  <text x="143" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#9ca3af">2437</text>
  <text x="207" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#9ca3af">1838</text>
  <text x="285" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#9ca3af">15308</text>
  <text x="361" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#9ca3af">11460</text>
  <text x="427" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#9ca3af">11340</text>
  <text x="510" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#9ca3af">4899</text>
  <text x="585" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#9ca3af">423</text>
  <text x="639" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#9ca3af">39946</text>
  <text x="697" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#9ca3af">287</text>
  <text x="783" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#9ca3af">3440</text>
  <text x="863" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#9ca3af">30</text>
  <text x="500" y="163" text-anchor="middle" font-size="9" fill="#9ca3af">↑ integer token IDs — what the transformer actually receives</text>

  <!-- Legend -->
  <rect x="286" y="178" width="11" height="11" rx="2" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="302" y="188" font-size="10" fill="#6b7280">split token</text>
  <rect x="378" y="178" width="11" height="11" rx="2" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="394" y="188" font-size="10" fill="#6b7280">single-word token</text>
  <rect x="502" y="178" width="11" height="11" rx="2" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="518" y="188" font-size="10" fill="#6b7280">punctuation</text>

</svg>
