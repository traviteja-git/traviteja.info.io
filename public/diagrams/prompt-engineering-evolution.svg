<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .bg-fill { fill: #f8faff; }
      .title-text { fill: #111111; }
      .sub-text { fill: #6b7280; }
      .muted-text { fill: #9ca3af; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" class="bg-fill" rx="12"/>
  <rect width="900" height="420" fill="none" stroke="#e4e4e7" stroke-width="1.5" rx="12"/>

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" font-size="16" font-weight="700" class="title-text">From prompts to orchestration — how developer scope expanded</text>
  <text x="450" y="62" text-anchor="middle" font-size="12" class="sub-text">Each stage adds to the one before it. The scope never shrinks.</text>

  <!-- Year label column x=100 (right-align), bars start x=116 -->

  <!-- 2023 bar -->
  <rect x="116" y="82" width="190" height="60" fill="#dbeafe" rx="7"/>
  <text x="104" y="118" text-anchor="end" font-size="14" font-weight="700" fill="#2563eb">2023</text>
  <text x="130" y="103" font-size="12.5" font-weight="700" fill="#1d4ed8">Ask the question</text>
  <text x="130" y="122" font-size="11" fill="#3b82f6">Your code  ·  knowing how to ask clearly</text>

  <!-- 2024 bar -->
  <rect x="116" y="162" width="340" height="60" fill="#93c5fd" rx="7"/>
  <text x="104" y="198" text-anchor="end" font-size="14" font-weight="700" fill="#2563eb">2024</text>
  <text x="130" y="183" font-size="12.5" font-weight="700" fill="#1d4ed8">Context + deliberate language</text>
  <text x="130" y="202" font-size="11" fill="#1e3a8a">Code  ·  context shaping  ·  prompt precision  ·  shared templates</text>

  <!-- 2025 bar -->
  <rect x="116" y="242" width="500" height="60" fill="#3b82f6" rx="7"/>
  <text x="104" y="278" text-anchor="end" font-size="14" font-weight="700" fill="#2563eb">2025</text>
  <text x="130" y="263" font-size="12.5" font-weight="700" fill="#ffffff">Agents + tools</text>
  <text x="130" y="282" font-size="11" fill="#dbeafe">Goals  ·  task decomposition  ·  tool design  ·  failures  ·  observability</text>

  <!-- 2026 bar -->
  <rect x="116" y="322" width="660" height="60" fill="#1d4ed8" rx="7"/>
  <text x="104" y="358" text-anchor="end" font-size="14" font-weight="700" fill="#1d4ed8">2026</text>
  <text x="130" y="343" font-size="12.5" font-weight="700" fill="#ffffff">Orchestrate systems</text>
  <text x="130" y="362" font-size="11" fill="#93c5fd">Connected tools  ·  MCP  ·  multi-agent coordination  ·  delegation  ·  validation</text>

  <!-- Expanding scope arrow on right -->
  <line x1="800" y1="395" x2="800" y2="78" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="800,74 796,84 804,84" fill="#cbd5e1"/>
  <text x="800" y="410" text-anchor="middle" font-size="10" class="muted-text">expanding scope</text>
</svg>
